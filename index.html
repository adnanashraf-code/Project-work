<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productive dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="main">
      <!-- <nav></nav> -->
      <section class="allelems">
        <div class="todo elem" id="0">
          <img
            src="https://images.unsplash.com/photo-1670588762722-34ded457ca3a?q=80&w=632&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt=""
          />
          <h2>To Do List</h2>
        </div>
        <div class="daily elem" id="1">
          <img
            src="https://images.unsplash.com/photo-1671638527616-15de1d37afb8?q=80&w=1160&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt=""
          />
          <h2>Daily tasks</h2>
        </div>
        <div class="moti elem" id="2">
          <img
            src="https://images.unsplash.com/photo-1634715841611-67741dc71459?q=80&w=2031&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt=""
          />
          <h2>Motivation</h2>
        </div>
        <div class="promo elem" id="3">
          <img
            src="https://images.unsplash.com/photo-1648843707968-e364a7663260?q=80&w=623&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt=""
          />
          <h2>Pomodoro timer</h2>
        </div>
        <div class="goals elem" id="4">
          <img
            src="https://images.unsplash.com/photo-1648461400287-881314915e2c?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt=""
          />
          <h2>Goals</h2>
        </div>
      </section>
      <section class="fullelems" id="todo-list">
        <button class="back" id="0">Close</button>
        <h1>To Do Page</h1>
      </section>
      <section class="fullelems" id="daily-tasks">
        <button class="back" id="1">Close</button>
        <h1>Daily tasks Page</h1>
      </section>
      <section class="fullelems" id="motivation">
        <button class="back" id="2">Close</button>
        <h1>Motivational Quotes</h1>
      </section>
      <section class="fullelems" id="promodoro">
        <button class="back" id="3">Close</button>
        <h1>Pomodoro timer</h1>
      </section>
      <section class="fullelems" id="goals">
        <button class="back" id="4">Close</button>
        <h1>Daily Goals</h1>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
